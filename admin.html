<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>PTS — غرفة التحكم</title>
  <link rel="icon" type="image/jpeg" href="assets/logo-vertical.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&family=Sora:wght@600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- ======= Login gate ======= -->
  <div class="gate" id="gate" hidden>
    <div class="gate__lang lang" data-lang-switch>
      <button class="lang__btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Language / اللغة / Langue">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 12h17M12 3.2c-2.6 2.4-3.9 5.4-3.9 8.8s1.3 6.4 3.9 8.8c2.6-2.4 3.9-5.4 3.9-8.8s-1.3-6.4-3.9-8.8Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span class="lang__cur">ع</span>
      </button>
      <div class="lang__menu" role="listbox" aria-label="Language">
        <button type="button" role="option" data-lang-opt="ar" class="lang__opt--ar"><span class="lang__tag lang__tag--ar">ع</span> العربية</button>
        <button type="button" role="option" data-lang-opt="en"><span class="lang__tag">EN</span> English</button>
        <button type="button" role="option" data-lang-opt="fr"><span class="lang__tag">FR</span> Français</button>
      </div>
    </div>
    <div class="gate__card">
      <div class="gate__logo"><img src="assets/logo-vertical.jpg" alt="PT Soft" width="110" height="110" /></div>
      <h1 data-i18n="gate.h1">غرفة التحكم</h1>
      <p data-i18n="gate.p">هذه المنطقة مخصصة لمالك PT Soft فقط.</p>
      <form id="gateForm">
        <input type="password" id="gatePassword" placeholder="كلمة المرور" data-i18n-ph="gate.pw" autocomplete="current-password" required />
        <button type="submit" class="btn-grad" id="gateBtn" data-i18n="gate.enter">دخول</button>
        <p class="gate__error" id="gateError" hidden data-i18n="gate.err">كلمة المرور غير صحيحة</p>
      </form>
    </div>
  </div>

  <!-- ======= Control room ======= -->
  <div class="room" id="room" hidden>
    <header class="room__bar">
      <div class="room__brand">
        <img src="assets/logo-vertical.jpg" alt="" width="42" height="42" />
        <div>
          <strong data-i18n="bar.title">غرفة التحكم</strong>
          <span data-i18n="bar.sub">إدارة مشاريع PT Soft</span>
        </div>
      </div>
      <div class="room__actions">
        <div class="lang" data-lang-switch>
          <button class="lang__btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Language / اللغة / Langue">
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 12h17M12 3.2c-2.6 2.4-3.9 5.4-3.9 8.8s1.3 6.4 3.9 8.8c2.6-2.4 3.9-5.4 3.9-8.8s-1.3-6.4-3.9-8.8Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <span class="lang__cur">ع</span>
          </button>
          <div class="lang__menu" role="listbox" aria-label="Language">
            <button type="button" role="option" data-lang-opt="ar" class="lang__opt--ar"><span class="lang__tag lang__tag--ar">ع</span> العربية</button>
            <button type="button" role="option" data-lang-opt="en"><span class="lang__tag">EN</span> English</button>
            <button type="button" role="option" data-lang-opt="fr"><span class="lang__tag">FR</span> Français</button>
          </div>
        </div>
        <a href="/" class="btn-ghost" target="_blank" rel="noopener" data-i18n="bar.view">عرض الموقع ↗</a>
        <button class="btn-ghost btn-ghost--danger" id="logoutBtn" data-i18n="bar.logout">خروج</button>
      </div>
    </header>

    <main class="room__main">
      <section class="panel">
        <div class="panel__head">
          <h2><span data-i18n="panel.h2">المشاريع المعروضة</span> <span class="count" id="projectCount"></span></h2>
          <button class="btn-grad" id="addBtn" data-i18n="panel.add">+ مشروع جديد</button>
        </div>
        <p class="panel__hint" data-i18n="panel.hint">
          التغييرات تظهر للزوار فور الضغط على «نشر التغييرات». الوسائط المفضلة:
          فيديو MP4 أفقي 16:9 أقل من 4MB (أخف وأنقى من GIF).
        </p>
        <div class="plist" id="plist"><!-- rendered --></div>
      </section>
    </main>

    <div class="savebar" id="savebar" hidden>
      <span id="saveMsg" data-i18n="save.msg">لديك تغييرات غير منشورة</span>
      <button class="btn-ghost" id="discardBtn" data-i18n="save.discard">تراجع</button>
      <button class="btn-grad" id="saveBtn" data-i18n="save.publish">نشر التغييرات</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Project editor template -->
  <template id="itemTpl">
    <article class="pitem">
      <header class="pitem__head">
        <div class="pitem__order">
          <button class="ord" data-act="up" data-i18n-title="item.up" title="تحريك لأعلى">↑</button>
          <button class="ord" data-act="down" data-i18n-title="item.down" title="تحريك لأسفل">↓</button>
        </div>
        <div class="pitem__title">
          <strong data-bind="name">—</strong>
          <span class="pitem__status" data-bind="statusLabel"></span>
        </div>
        <div class="pitem__tools">
          <button class="tool" data-act="toggle" data-i18n="item.edit">تحرير</button>
          <button class="tool tool--danger" data-act="delete" data-i18n="item.delete">حذف</button>
        </div>
      </header>
      <div class="pitem__body" hidden>
        <div class="pitem__grid">
          <div class="pitem__fields">
            <label><span data-i18n="f.name">اسم المشروع</span>
              <input type="text" data-field="name" maxlength="120" />
            </label>
            <label><span data-i18n="f.desc">الوصف (يظهر على البطاقة)</span>
              <textarea data-field="description" rows="3" maxlength="600"></textarea>
            </label>
            <fieldset class="chips" data-field="tech">
              <legend data-i18n="f.tech">نوع المشروع / التقنيات (حتى 4)</legend>
              <!-- chips injected -->
              <input type="text" class="chips__custom" placeholder="+ نوع مخصص ثم Enter" data-i18n-ph="f.techCustom" maxlength="30" />
            </fieldset>
            <fieldset class="status" data-field="status">
              <legend data-i18n="f.status">حالة المشروع</legend>
              <label><input type="radio" value="planned" name="" /><span class="st st--planned" data-i18n="st.planned">قيد التخطيط</span></label>
              <label><input type="radio" value="development" name="" /><span class="st st--dev" data-i18n="st.development">قيد التطوير</span></label>
              <label><input type="radio" value="live" name="" /><span class="st st--live" data-i18n="st.live">مباشر</span></label>
            </fieldset>
            <label><span data-i18n="f.link">رابط خارجي (اختياري)</span>
              <input type="url" data-field="link" placeholder="https://…" dir="ltr" />
            </label>
          </div>
          <div class="pitem__media">
            <span class="pitem__media-label" data-i18n="media.label">وسائط البطاقة</span>
            <div class="mediabox" data-bind="media">
              <span class="mediabox__empty" data-i18n="media.empty">بدون وسائط — سيُولَّد غلاف فني تلقائياً</span>
            </div>
            <div class="mediabtns">
              <label class="btn-ghost btn-file">
                <span data-i18n="media.upload">رفع فيديو / صورة</span>
                <input type="file" data-act="upload" accept="video/mp4,video/webm,image/gif,image/jpeg,image/png,image/webp" hidden />
              </label>
              <button class="tool tool--danger" data-act="clearMedia" hidden data-i18n="media.clear">إزالة الوسائط</button>
            </div>
            <progress class="upprog" value="0" max="100" hidden></progress>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="js/admin.js" defer></script>
</body>
</html>
